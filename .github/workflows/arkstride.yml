name: ARKSTRIDE Reality Verification

on:
  push:
  pull_request:

jobs:
  reality-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Verify OPA Installation
        run: opa version

      - name: Build Enterprise Genome
        run: python scripts/genome_builder.py

      - name: Verify Safe Scenarios
        run: python scripts/verify_all.py

      - name: Scan Terraform Infrastructure
        run: python scripts/scan_terraform.py

      - name: Scan IAM Policies
        run: python scripts/scan_iam.py

      - name: Verify Remediation Loop
        run: python scripts/verify_remediation.py

      - name: Generate PR Comment If Report Exists
        run: |
          if [ -f reports/latest_report.json ]; then
            python scripts/pr_comment.py reports/latest_report.json
          else
            echo "No ARKSTRIDE report generated."
          fi