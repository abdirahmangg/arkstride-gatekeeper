name: ARKSTRIDE Graph-Native Verification

on:
  push:
  pull_request:

jobs:
  graph-native-verification:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Enterprise Knowledge Graph
        run: python scripts/build_graph.py

      - name: Verify Safe Scenarios
        run: python scripts/verify_all.py

      - name: Generate ARKSTRIDE Narrative If Report Exists
        run: |
          if [ -f reports/latest_report.json ]; then
            python scripts/pr_comment.py reports/latest_report.json
          else
            echo "No ARKSTRIDE report generated."
          fi

      - name: Upload ARKSTRIDE Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arkstride-graph-reports
          path: |
            reports/
            arkstride_pr_comment.md
          if-no-files-found: ignore
